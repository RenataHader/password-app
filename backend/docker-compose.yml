services:
  postgres:
    image: postgres:16
    container_name: password_app_postgres
    environment:
      POSTGRES_DB: password_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - password_app_data:/var/lib/postgresql/data

volumes:
  password_app_data: